<svg width="860" height="620" viewBox="0 0 860 620" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="860" height="620" fill="#EEF3F7"/>
  <rect x="130" y="70" width="600" height="470" rx="24" fill="#FFFFFF"/>
  <rect x="130.5" y="70.5" width="599" height="469" rx="23.5" stroke="#D8E1E8"/>

  <text x="170" y="126" fill="#18212B" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700">Matilde wakeup</text>
  <rect x="600" y="95" width="92" height="34" rx="17" fill="#1976D2"/>
  <text x="625" y="117" fill="#FFFFFF" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700">armed</text>

  <g font-family="Arial, Helvetica, sans-serif">
    <text x="170" y="178" fill="#6C7A89" font-size="15">Enabled</text>
    <rect x="300" y="157" width="56" height="30" rx="15" fill="#1976D2"/>
    <circle cx="340" cy="172" r="11" fill="#FFFFFF"/>

    <text x="430" y="178" fill="#6C7A89" font-size="15">Require home</text>
    <rect x="590" y="157" width="56" height="30" rx="15" fill="#D7E0E8"/>
    <circle cx="605" cy="172" r="11" fill="#FFFFFF"/>

    <text x="170" y="246" fill="#6C7A89" font-size="15">Alarm time</text>
    <rect x="170" y="258" width="210" height="46" rx="10" fill="#FFFFFF" stroke="#CCD6DD"/>
    <text x="188" y="288" fill="#18212B" font-size="22" font-weight="600">07:00</text>

    <text x="430" y="246" fill="#6C7A89" font-size="15">Playlist</text>
    <rect x="430" y="258" width="260" height="46" rx="10" fill="#FFFFFF" stroke="#CCD6DD"/>
    <text x="448" y="288" fill="#18212B" font-size="18">Morning Focus</text>

    <text x="170" y="352" fill="#6C7A89" font-size="15">Fade duration (min)</text>
    <line x1="170" y1="382" x2="370" y2="382" stroke="#D0D9E0" stroke-width="8" stroke-linecap="round"/>
    <line x1="170" y1="382" x2="290" y2="382" stroke="#1976D2" stroke-width="8" stroke-linecap="round"/>
    <circle cx="290" cy="382" r="12" fill="#1976D2"/>
    <text x="170" y="412" fill="#18212B" font-size="18" font-weight="600">15 min</text>

    <text x="430" y="352" fill="#6C7A89" font-size="15">Volume</text>
    <line x1="430" y1="382" x2="630" y2="382" stroke="#D0D9E0" stroke-width="8" stroke-linecap="round"/>
    <line x1="430" y1="382" x2="545" y2="382" stroke="#1976D2" stroke-width="8" stroke-linecap="round"/>
    <circle cx="545" cy="382" r="12" fill="#1976D2"/>
    <text x="430" y="412" fill="#18212B" font-size="18" font-weight="600">55%</text>
  </g>

  <line x1="170" y1="452" x2="690" y2="452" stroke="#E2E8EE"/>

  <text x="170" y="490" fill="#6C7A89" font-family="Arial, Helvetica, sans-serif" font-size="15">Next alarm:</text>
  <text x="170" y="520" fill="#18212B" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700">Tue, Mar 10, 7:00 AM</text>
  <text x="170" y="546" fill="#6C7A89" font-family="Arial, Helvetica, sans-serif" font-size="14">Person: person.matilde</text>

  <text x="170" y="578" fill="#6C7A89" font-family="Arial, Helvetica, sans-serif" font-size="15">Snooze delay</text>
  <text x="315" y="578" fill="#18212B" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700">10 min</text>
  <line x1="170" y1="596" x2="390" y2="596" stroke="#D0D9E0" stroke-width="8" stroke-linecap="round"/>
  <line x1="170" y1="596" x2="220" y2="596" stroke="#1976D2" stroke-width="8" stroke-linecap="round"/>
  <circle cx="220" cy="596" r="12" fill="#1976D2"/>

  <g font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700">
    <rect x="430" y="482" width="104" height="40" rx="20" fill="#1976D2"/>
    <text x="449" y="507" fill="#FFFFFF">Trigger now</text>

    <rect x="430" y="532" width="132" height="40" rx="20" fill="#FFFFFF" stroke="#C9D4DC"/>
    <text x="455" y="557" fill="#18212B">Snooze 10 min</text>

    <rect x="572" y="532" width="86" height="40" rx="20" fill="#DB4437"/>
    <text x="600" y="557" fill="#FFFFFF">Stop</text>
  </g>

  <text x="130" y="612" fill="#617180" font-family="Arial, Helvetica, sans-serif" font-size="14">Mockup of the Personal Wakeup card with snooze slider and active-alarm actions visible.</text>
</svg>
